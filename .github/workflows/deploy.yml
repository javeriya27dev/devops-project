name: Deploy to EC2

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        run: |
          echo "${{ secrets.EC2_SSH_KEY }}" > key.pem
          chmod 600 key.pem

          ssh -o StrictHostKeyChecking=no -i key.pem ec2-user@3.111.218.207 << 'EOF'
            cd ~/myapp
            docker stop myapp || true
            docker rm myapp || true
            docker build -t myapp .
            docker run -d -p 80:3000 --name myapp myapp
          EOF
